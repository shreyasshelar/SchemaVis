server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy API calls to backend.
    # In Kubernetes: schema-vis-backend:8080 (ClusterIP DNS).
    # In Cloud Run:  BACKEND_URL env var is substituted at container start
    #                via nginx templates (envsubst run by official nginx image).
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # /docs and /docs/ must serve the React SPA (DocsPage component).
    # Without these exact-match rules, nginx finds dist/docs/ directory,
    # sees no index.html inside it, and returns 403 instead of the SPA.
    location = /docs {
        add_header Cache-Control "no-store";
        try_files /index.html =404;
    }
    location = /docs/ {
        add_header Cache-Control "no-store";
        try_files /index.html =404;
    }

    location / {
        # HTML (including the SPA index.html fallback) must never be cached so
        # deployments reach browsers immediately. Hashed assets in /assets/ are
        # handled separately above with long-lived immutable headers.
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
}
