{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: schema-vis-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schema-vis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "schema-vis.selectorLabels" (list . "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
{{- end }}
