{{- if .Values.createSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: schema-vis-backend-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schema-vis.labels" . | nindent 4 }}
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: {{ .Values.backend.secrets.SPRING_DATASOURCE_PASSWORD | required "backend.secrets.SPRING_DATASOURCE_PASSWORD is required" | quote }}
  JWT_SECRET:                  {{ .Values.backend.secrets.JWT_SECRET | required "backend.secrets.JWT_SECRET is required" | quote }}
  GEMINI_API_KEY:              {{ .Values.backend.secrets.GEMINI_API_KEY | quote }}
  GROQ_API_KEY:                {{ .Values.backend.secrets.GROQ_API_KEY | quote }}
  OPENROUTER_API_KEY:          {{ .Values.backend.secrets.OPENROUTER_API_KEY | quote }}
{{- end }}
