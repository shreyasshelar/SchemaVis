# ── Secret management ────────────────────────────────────────────
# false  = ArgoCD mode: secrets pre-created manually on the cluster
# true   = Helm-managed: secrets created from values below (local/CI use)
createSecrets: false

# ── Backend ──────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/shreyasshelar/schema-vis-backend
    tag: latest
    pullPolicy: Always
    pullSecrets: 
      - ghcr-credentials           # populated by deploy workflow for private registry
  replicaCount: 1
  port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    SPRING_PROFILES_ACTIVE: prod
    SPRING_DATASOURCE_URL: jdbc:postgresql://schema-vis-postgres:5432/schemavis
    SPRING_DATASOURCE_USERNAME: schemavis
    RATE_LIMIT: "20"
  # Only used when createSecrets: true
  secrets:
    SPRING_DATASOURCE_PASSWORD: ""
    JWT_SECRET: ""
    GEMINI_API_KEY: ""
    GROQ_API_KEY: ""
    OPENROUTER_API_KEY: ""
  probes:
    liveness:
      path: /actuator/health/liveness
      initialDelaySeconds: 60
      periodSeconds: 30
    readiness:
      path: /actuator/health/readiness
      initialDelaySeconds: 30
      periodSeconds: 10

# ── Frontend ─────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/shreyasshelar/schema-vis-frontend
    tag: latest
    pullPolicy: Always
    pullSecrets: 
      - ghcr-credentials
  replicaCount: 1
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# ── PostgreSQL ───────────────────────────────────────────────────
postgres:
  enabled: true
  image: postgres:16-alpine
  port: 5432
  database: schemavis
  user: schemavis
  storage: 5Gi
  storageClass: local-path      # k3s default; use standard-rwo for GKE
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── Cloudflare Tunnel ────────────────────────────────────────────
cloudflared:
  enabled: true
  image: cloudflare/cloudflared:2025.1.0
  replicaCount: 2
  tunnelToken: ""              # injected via k8s secret — never commit
  hostname: schemavis.shreyasshelar.uk
  imagePullSecrets: []
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"
