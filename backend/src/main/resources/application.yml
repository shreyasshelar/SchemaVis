spring:
  application:
    name: schema-visualiser
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway auto-detects datasource URL — no override needed for PostgreSQL

  cache:
    type: simple   # swap to 'redis' for multi-instance prod

# ── Actuator ──────────────────────────────────────────────────────
# Only health + info exposed publicly.  Add metrics behind auth in prod.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: SchemaVis
    version: '@project.version@'

# ── AI Providers — fallback chain: Gemini → Groq → OpenRouter ────
# Keys come from env vars / k8s secrets — no defaults with real values.
ai:
  gemini:
    api-key:  ${GEMINI_API_KEY:}
    model:    gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta/models
  groq:
    api-key:  ${GROQ_API_KEY:}
    model:    llama-3.3-70b-versatile
    base-url: https://api.groq.com/openai/v1
  openrouter:
    api-key:  ${OPENROUTER_API_KEY:}
    model:    meta-llama/llama-3.1-8b-instruct:free
    base-url: https://openrouter.ai/api/v1

# ── JWT ───────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a long random string (64+ chars).
jwt:
  secret: ${JWT_SECRET:schemavis-dev-secret-change-this-in-production-use-64chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:2592000000}   # 30 days

# ── Rate limiting (requests per IP per minute) ────────────────────
rate-limit:
  requests-per-minute: ${RATE_LIMIT:20}

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
