name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write     # push to ghcr.io

env:
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/schema-vis-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/schema-vis-frontend

# GitHub Actions ONLY builds and pushes images.
# ArgoCD Image Updater detects new tags and triggers deployment automatically.
# No cluster credentials needed here.
jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: sha-${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect tag \`sha-${{ steps.sha.outputs.short }}\` and reconcile the cluster." >> $GITHUB_STEP_SUMMARY
