name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write    # push ArgoCD source file back to main
  packages: write    # push to ghcr.io

env:
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/schema-vis-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/schema-vis-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: sha-${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Update ArgoCD image tags
        env:
          TAG: sha-${{ steps.sha.outputs.short }}
          GIT_AUTHOR_NAME: shreyasshelar
          GIT_AUTHOR_EMAIL: shreyasshelarrr@gmail.com
          GIT_COMMITTER_NAME: shreyasshelar
          GIT_COMMITTER_EMAIL: shreyasshelarrr@gmail.com
        run: |
          # Write the new image tag into the ArgoCD source override file.
          # This bypasses ArgoCD Image Updater's alphabetical sha sorting (which is
          # unreliable with hex shas — newer commits can sort alphabetically lower).
          cat > helm/schema-vis/.argocd-source-schema-vis.yaml <<EOF
          helm:
            parameters:
            - name: backend.image.tag
              value: ${TAG}
              forcestring: true
            - name: createSecrets
              value: "false"
              forcestring: false
            - name: frontend.image.tag
              value: ${TAG}
              forcestring: true
            - name: image.name
              value: ghcr.io/shreyasshelar/schema-vis-frontend
              forcestring: true
          EOF

          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add helm/schema-vis/.argocd-source-schema-vis.yaml
          git diff --cached --quiet || git commit -m "build: deploy ${TAG} to production"
          git push origin HEAD:main

      - name: Summary
        run: |
          echo "### Images pushed & ArgoCD updated" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will sync \`sha-${{ steps.sha.outputs.short }}\` automatically." >> $GITHUB_STEP_SUMMARY
