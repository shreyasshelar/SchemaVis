name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write     # push to ghcr.io

env:
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/schema-vis-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/schema-vis-frontend

# How deployment works:
#   1. This workflow builds & pushes images tagged as YYYYMMDDHHMMSS-sha-<short>.
#      Timestamp prefix ensures alphabetical sort = chronological order, so
#      ArgoCD Image Updater's "alphabetical" strategy always picks the newest build.
#   2. ArgoCD Image Updater detects the new tag and writes it to
#      helm/schema-vis/.argocd-source-schema-vis.yaml on main (it has a PAT).
#   3. ArgoCD auto-syncs and rolls out new pods.
jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (timestamp + sha)
        id: tag
        run: |
          TS=$(date -u +%Y%m%d%H%M%S)
          SHA=$(git rev-parse --short HEAD)
          echo "value=${TS}-sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will pick up tag \`${{ steps.tag.outputs.value }}\` (alphabetical = chronological) and reconcile the cluster." >> $GITHUB_STEP_SUMMARY
