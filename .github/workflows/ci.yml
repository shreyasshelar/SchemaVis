name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

jobs:
  # ── Backend ─────────────────────────────────────────────────────
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schemavis_test
          POSTGRES_USER: schemavis
          POSTGRES_PASSWORD: schemavis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          DATABASE_URL: jdbc:postgresql://localhost:5432/schemavis_test
          DB_USER: schemavis
          DB_PASSWORD: schemavis
          GEMINI_API_KEY: test-key-not-used-in-unit-tests
        run: mvn -B verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
